version: '3.8'

services:
  api:
    build: ./api
    container_name: wacrm-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_DSN=root:password@tcp(mysql:3306)/wacrm?charset=utf8mb4&parseTime=True&loc=Local
      - PORT=8080
    depends_on:
      - mysql
    networks:
      - wacrm-network

  mysql:
    image: mysql:8.0
    container_name: wacrm-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=wacrm
      - MYSQL_USER=wacrm
      - MYSQL_PASSWORD=wacrm_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - wacrm-network

  # Optional: Nginx reverse proxy for SSL
  nginx:
    image: nginx:alpine
    container_name: wacrm-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - wacrm-network

volumes:
  mysql_data:

networks:
  wacrm-network:
    driver: bridge
